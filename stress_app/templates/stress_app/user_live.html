<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Detection - StressNet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d0d2b 0%,#1a1a4e 100%);min-height:100vh;color:#e2e8f0;padding:20px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.header-left{display:flex;align-items:center;gap:12px;}
.brand{font-size:20px;font-weight:800;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.grid{display:grid;grid-template-columns:1fr 320px;gap:16px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;}
.card-title{font-size:12px;font-weight:600;color:#a0aec0;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.btn-start{padding:9px 20px;background:linear-gradient(135deg,#68d391,#38a169);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.btn-stop{padding:9px 20px;background:rgba(252,73,73,0.2);border:1px solid rgba(252,73,73,0.4);border-radius:8px;color:#fc8181;font-size:13px;font-weight:700;cursor:pointer;display:none;}
.video-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;background:#000;min-height:360px;}
video{width:100%;display:block;border-radius:10px;}
canvas#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.no-camera{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#4a5568;}
.no-camera-icon{font-size:48px;}
.status-bar{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#718096;}
.stress-display{text-align:center;padding:16px 0;}
.stress-level-text{font-size:32px;font-weight:800;color:#4a5568;}
.emotion-text{font-size:16px;color:#718096;text-transform:capitalize;margin-top:4px;}
.conf-bar-wrap{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin:10px 0 4px;}
.conf-bar-fill{height:100%;border-radius:3px;background:#4a5568;width:0%;transition:width 0.4s;}
.conf-text{font-size:11px;color:#718096;text-align:center;}
.emotion-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.emotion-name{font-size:11px;color:#a0aec0;text-transform:capitalize;width:70px;}
.emotion-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;margin:0 8px;}
.emotion-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.emotion-val{font-size:11px;color:#718096;width:38px;text-align:right;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.stat-box{text-align:center;padding:10px;border-radius:8px;}
.stat-num{font-size:20px;font-weight:700;}
.stat-label{font-size:10px;margin-top:2px;}
.nav-links{display:flex;gap:8px;}
.nav-link{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#a0aec0;text-decoration:none;font-size:12px;}
.nav-link:hover{background:rgba(255,255,255,0.1);color:#e2e8f0;}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <span style="font-size:24px;">🧠</span>
        <span class="brand">StressNet</span>
        <span style="font-size:13px;color:#718096;">Live Detection</span>
    </div>
    <div class="nav-links">
        <a href="/dashboard/" class="nav-link">📊 Dashboard</a>
        <a href="/history/" class="nav-link">📋 History</a>
        <a href="/logout/" class="nav-link">🚪 Logout</a>
    </div>
</div>

<div class="grid">

    <!-- Left: Camera -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <span class="card-title" style="margin-bottom:0;">📷 Camera Feed</span>
            <div style="display:flex;gap:8px;">
                <button class="btn-start" id="startBtn" onclick="startDetection()">▶ Start</button>
                <button class="btn-stop"  id="stopBtn"  onclick="stopDetection()">⏹ Stop</button>
            </div>
        </div>

        <div class="video-wrap" id="videoWrap">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div class="no-camera" id="noCamera">
                <div class="no-camera-icon">📷</div>
                <div style="font-size:14px;margin-top:8px;color:#718096;">Click Start to begin</div>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">Status: Stopped</span>
            <span id="fpsText">FPS: --</span>
            <span id="faceText">Faces: 0</span>
        </div>
    </div>

    <!-- Right: Results -->
    <div style="display:flex;flex-direction:column;gap:12px;">

        <!-- Stress Result -->
        <div class="card">
            <div class="card-title">Current Detection</div>
            <div class="stress-display">
                <div class="stress-level-text" id="stressLevelText">--</div>
                <div class="emotion-text" id="emotionDisplay">No detection yet</div>
            </div>
            <div class="conf-bar-wrap">
                <div class="conf-bar-fill" id="confFill"></div>
            </div>
            <div class="conf-text" id="confText">Confidence: 0%</div>
        </div>

        <!-- Emotion Bars -->
        <div class="card">
            <div class="card-title">Emotion Scores</div>
            <div id="emotionBarsContainer">
                <div style="color:#4a5568;font-size:12px;text-align:center;padding:10px;">Start detection to see scores</div>
            </div>
        </div>

        <!-- Session Stats -->
        <div class="card">
            <div class="card-title">Session Stats</div>
            <div class="stats-grid">
                <div class="stat-box" style="background:rgba(252,73,73,0.08);">
                    <div class="stat-num" style="color:#fc8181;" id="sHigh">0</div>
                    <div class="stat-label" style="color:#fc8181;">HIGH</div>
                </div>
                <div class="stat-box" style="background:rgba(246,173,85,0.08);">
                    <div class="stat-num" style="color:#f6ad55;" id="sMed">0</div>
                    <div class="stat-label" style="color:#f6ad55;">MEDIUM</div>
                </div>
                <div class="stat-box" style="background:rgba(104,211,145,0.08);">
                    <div class="stat-num" style="color:#68d391;" id="sLow">0</div>
                    <div class="stat-label" style="color:#68d391;">LOW</div>
                </div>
                <div class="stat-box" style="background:rgba(102,126,234,0.08);">
                    <div class="stat-num" style="color:#667eea;" id="sTotal">0</div>
                    <div class="stat-label" style="color:#667eea;">TOTAL</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Hidden canvas for frame capture -->
<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
var video         = document.getElementById('video');
var overlay       = document.getElementById('overlay');
var captureCanvas = document.getElementById('captureCanvas');
var ctx           = overlay.getContext('2d');
var capCtx        = captureCanvas.getContext('2d');
var stream        = null;
var detecting     = false;
var timer         = null;
var frameCount    = 0;
var lastFps       = Date.now();
var sHigh=0, sMed=0, sLow=0, sTotal=0;

var EMOTIONS = ['angry','disgusted','fearful','happy','neutral','sad','surprised'];
var ECOLORS  = {angry:'#fc8181',disgusted:'#b794f4',fearful:'#f6ad55',happy:'#68d391',neutral:'#63b3ed',sad:'#90cdf4',surprised:'#fbd38d'};

function getCookie(name){
    var m = document.cookie.match('(^|;) ?'+name+'=([^;]*)(;|$)');
    return m ? m[2] : null;
}

async function startDetection(){
    try{
        stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});
        video.srcObject = stream;
        document.getElementById('noCamera').style.display = 'none';
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display  = 'block';
        document.getElementById('statusText').textContent = 'Status: Running ✅';
        detecting = true;
        timer = setInterval(sendFrame, 1500);
    } catch(e){
        alert('Camera error: ' + e.message + '\n\nPlease allow camera permission in browser.');
    }
}

function stopDetection(){
    detecting = false;
    clearInterval(timer);
    if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
    video.srcObject = null;
    ctx.clearRect(0,0,overlay.width,overlay.height);
    document.getElementById('noCamera').style.display = 'block';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display  = 'none';
    document.getElementById('statusText').textContent = 'Status: Stopped';
    document.getElementById('faceText').textContent   = 'Faces: 0';
}

function sendFrame(){
    if(!detecting || !stream || !video.videoWidth) return;

    captureCanvas.width  = video.videoWidth;
    captureCanvas.height = video.videoHeight;
    overlay.width  = video.videoWidth;
    overlay.height = video.videoHeight;

    capCtx.drawImage(video, 0, 0);
    var frameData = captureCanvas.toDataURL('image/jpeg', 0.85);

    fetch('/live/frame/', {
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({frame: frameData})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
        if(!data || data.error){ return; }

        var results = data.results || [];
        document.getElementById('faceText').textContent = 'Faces: ' + results.length;

        // Clear overlay
        ctx.clearRect(0,0,overlay.width,overlay.height);

        results.forEach(function(r){
            var b = r.bbox;
            var color = r.stress_level==='High' ? '#fc8181' : r.stress_level==='Medium' ? '#f6ad55' : '#68d391';
            var rgbColor = r.stress_level==='High' ? 'rgb(252,129,129)' : r.stress_level==='Medium' ? 'rgb(246,173,85)' : 'rgb(104,211,145)';

            // Draw bounding box
            ctx.strokeStyle = rgbColor;
            ctx.lineWidth   = 3;
            ctx.strokeRect(b[0], b[1], b[2], b[3]);

            // Label background
            var label = r.emotion + ' ' + parseFloat(r.confidence).toFixed(0) + '%';
            ctx.font = 'bold 15px Segoe UI';
            var tw = ctx.measureText(label).width + 12;
            ctx.fillStyle = rgbColor;
            ctx.fillRect(b[0], b[1]-24, tw, 24);
            ctx.fillStyle = '#000000';
            ctx.fillText(label, b[0]+6, b[1]-6);

            // Update panel with first face
            updateResultPanel(r);
        });

        // FPS
        frameCount++;
        var now = Date.now();
        if(now - lastFps >= 1000){
            document.getElementById('fpsText').textContent = 'FPS: ' + frameCount;
            frameCount = 0;
            lastFps = now;
        }
    })
    .catch(function(e){ console.warn('Frame error:', e); });
}

function updateResultPanel(r){
    var color = r.stress_level==='High' ? '#fc8181' : r.stress_level==='Medium' ? '#f6ad55' : '#68d391';
    var conf  = parseFloat(r.confidence);

    document.getElementById('stressLevelText').textContent = r.stress_level + ' Stress';
    document.getElementById('stressLevelText').style.color = color;
    document.getElementById('emotionDisplay').textContent  = r.emotion;
    document.getElementById('emotionDisplay').style.color  = color;
    document.getElementById('confFill').style.width        = conf + '%';
    document.getElementById('confFill').style.background   = color;
    document.getElementById('confText').textContent        = 'Confidence: ' + conf.toFixed(1) + '%';

    // Emotion score bars
    var scores = r.scores || {};
    var html = '';
    EMOTIONS.forEach(function(em){
        var val = parseFloat(scores[em] || 0);
        var c   = ECOLORS[em] || '#667eea';
        html += '<div class="emotion-row">'
            + '<span class="emotion-name">' + em + '</span>'
            + '<div class="emotion-bar-bg"><div class="emotion-bar-fill" style="width:'+val+'%;background:'+c+';"></div></div>'
            + '<span class="emotion-val">' + val.toFixed(1) + '%</span>'
            + '</div>';
    });
    document.getElementById('emotionBarsContainer').innerHTML = html;

    // Stats
    sTotal++;
    if(r.stress_level==='High') sHigh++;
    else if(r.stress_level==='Medium') sMed++;
    else sLow++;
    document.getElementById('sHigh').textContent  = sHigh;
    document.getElementById('sMed').textContent   = sMed;
    document.getElementById('sLow').textContent   = sLow;
    document.getElementById('sTotal').textContent = sTotal;
}
</script>

</body>
</html>
