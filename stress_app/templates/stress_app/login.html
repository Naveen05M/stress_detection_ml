<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - StressNet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d0d2b 0%,#1a1a4e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;width:100%;max-width:400px;backdrop-filter:blur(10px);}
.brand{text-align:center;margin-bottom:28px;}
.brand-icon{font-size:48px;}
.brand-name{font-size:26px;font-weight:800;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:6px;}
.brand-sub{font-size:12px;color:#718096;margin-top:2px;}
label{display:block;color:#a0aec0;font-size:12px;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#e2e8f0;padding:12px 14px;font-size:14px;outline:none;transition:border 0.2s;}
input:focus{border-color:#667eea;}
.field{margin-bottom:18px;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.error{background:rgba(252,73,73,0.12);border:1px solid rgba(252,73,73,0.3);border-radius:10px;color:#fc8181;padding:12px 14px;font-size:13px;margin-bottom:18px;}
.link{text-align:center;margin-top:18px;font-size:13px;color:#718096;}
.link a{color:#667eea;text-decoration:none;}
.divider{text-align:center;color:#4a5568;font-size:12px;margin:18px 0;}
.admin-link{display:block;text-align:center;padding:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#a0aec0;font-size:12px;text-decoration:none;}
.admin-link:hover{background:rgba(255,255,255,0.08);color:#e2e8f0;}
</style>
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="brand-icon">🧠</div>
        <div class="brand-name">StressNet</div>
        <div class="brand-sub">Stress Detection System</div>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Employee ID or Email</label>
            <input type="text" name="identifier" placeholder="Enter your Employee ID or email" required autofocus>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="{% url 'register_view' %}">Register here</a>
    </div>

    <div class="divider">──── or ────</div>
    <a href="/admin-panel/" class="admin-link">🔐 Admin Panel Login</a>
</div>
</body>
</html>
