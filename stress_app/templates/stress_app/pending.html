<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Pending Approval</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',sans-serif;background:#0d0d2b;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style>
</head><body>
<div style="text-align:center;padding:40px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;max-width:420px;">
    <div style="font-size:60px;margin-bottom:16px;">⏳</div>
    <h2 style="color:#f6ad55;margin-bottom:10px;">Pending Approval</h2>
    <p style="color:#a0aec0;font-size:14px;line-height:1.6;">Hello <strong style="color:#e2e8f0;">{{ emp.full_name }}</strong>, your account is waiting for admin approval.<br><br>You will be able to login once the admin approves your registration.</p>
    <div style="margin-top:20px;padding:12px;background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.2);border-radius:10px;font-size:12px;color:#f6ad55;">Employee ID: {{ emp.employee_id }}</div>
    <a href="{% url 'logout_view' %}" style="display:inline-block;margin-top:20px;padding:10px 24px;background:rgba(252,73,73,0.2);color:#fc8181;border:1px solid rgba(252,73,73,0.3);border-radius:9px;text-decoration:none;font-size:13px;">Logout</a>
</div>
</body></html>
